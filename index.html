<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/app-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashot</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("theme") || "system";
          const dark =
            theme === "dark" ||
            (theme === "system" &&
              typeof window.matchMedia === "function" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (_) {}
      })();
    </script>
  </head>

  <body>
    <!-- Prevent white flash on transparent windows (pin, overlay, scroll chrome).
         The inline style is set synchronously before any framework code loads,
         so the body is transparent from the first paint. Opaque routes
         (about, settings, updater) are left unchanged. -->
    <script>
      (() => {
        var h = window.location.hash || "";
        if (h.startsWith("#/pin/") || h.startsWith("#/scroll-chrome/") || h.startsWith("#/overlay")) {
          document.body.style.background = "transparent";
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
