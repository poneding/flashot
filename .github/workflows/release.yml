name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string
      draft:
        description: "Create or keep the GitHub Release as a draft"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
  RELEASE_PRERELEASE: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-') || (github.event_name == 'workflow_dispatch' && inputs.prerelease) }}

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");

          const tag = process.env.RELEASE_TAG;
          if (!/^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/.test(tag)) {
            throw new Error(`Release tag must look like v1.2.3 or v1.2.3-beta.1, got ${tag}`);
          }

          const expected = tag.slice(1);
          const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const tauriVersion = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^version = "([^"]+)"/m)?.[1];

          const versions = {
            "package.json": packageVersion,
            "src-tauri/tauri.conf.json": tauriVersion,
            "src-tauri/Cargo.toml": cargoVersion,
          };

          for (const [file, version] of Object.entries(versions)) {
            if (version !== expected) {
              throw new Error(`${file} version ${version} does not match ${tag}`);
            }
          }

          console.log(`Release ${tag} matches project version ${expected}.`);
          NODE

  changelog:
    name: Generate release notes
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Generate changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

  release:
    name: Build release (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs: [validate, changelog]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
          - name: macos-x86_64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin
          - name: windows-x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: --target x86_64-pc-windows-msvc --bundles nsis
          - name: linux-x86_64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: --target x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libpipewire-0.3-dev libwayland-dev libgbm-dev libegl-dev

      - name: Install macOS signing certificate
        if: runner.os == 'macOS'
        timeout-minutes: 5
        shell: bash
        env:
          MACOS_CODESIGN_CERTIFICATE: ${{ secrets.MACOS_CODESIGN_CERTIFICATE }}
          MACOS_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail

          for name in MACOS_CODESIGN_CERTIFICATE MACOS_CODESIGN_CERTIFICATE_PASSWORD MACOS_CODESIGN_IDENTITY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing $name. Generate a fixed self-signed code-signing certificate and add it as a repository secret."
              exit 1
            fi
          done

          CERTIFICATE_PATH="$RUNNER_TEMP/flashot-codesign.p12"
          CERTIFICATE_PEM_PATH="$RUNNER_TEMP/flashot-codesign.pem"
          KEYCHAIN_PATH="$RUNNER_TEMP/flashot-codesign.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          echo "Decoding macOS signing certificate"
          printf '%s' "$MACOS_CODESIGN_CERTIFICATE" | base64 -d > "$CERTIFICATE_PATH"
          PKCS12_LEGACY_ARG=""
          if openssl pkcs12 -help 2>&1 | grep -q -- "-legacy"; then
            PKCS12_LEGACY_ARG="-legacy"
          fi
          if [ -n "$PKCS12_LEGACY_ARG" ]; then
            openssl pkcs12 \
              -in "$CERTIFICATE_PATH" \
              "$PKCS12_LEGACY_ARG" \
              -clcerts \
              -nokeys \
              -out "$CERTIFICATE_PEM_PATH" \
              -passin "pass:$MACOS_CODESIGN_CERTIFICATE_PASSWORD"
          else
            openssl pkcs12 \
              -in "$CERTIFICATE_PATH" \
              -clcerts \
              -nokeys \
              -out "$CERTIFICATE_PEM_PATH" \
              -passin "pass:$MACOS_CODESIGN_CERTIFICATE_PASSWORD"
          fi

          echo "Trusting macOS signing certificate in system keychain"
          sudo security add-trusted-cert \
            -d \
            -r trustRoot \
            -p codeSign \
            -k /Library/Keychains/System.keychain \
            "$CERTIFICATE_PEM_PATH"

          echo "Creating temporary signing keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "Importing macOS signing identity"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CODESIGN_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          echo "Allowing codesign to access the imported private key"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          USER_KEYCHAINS=()
          while IFS= read -r keychain; do
            USER_KEYCHAINS+=("$keychain")
          done < <(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${USER_KEYCHAINS[@]}"

          echo "Verifying macOS signing identity"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$MACOS_CODESIGN_IDENTITY"; then
            echo "::error::MACOS_CODESIGN_IDENTITY '$MACOS_CODESIGN_IDENTITY' was not found in the imported certificate."
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$MACOS_CODESIGN_IDENTITY" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish GitHub Release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Flashot ${{ env.RELEASE_TAG }}"
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: ${{ env.RELEASE_DRAFT }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          assetNamePattern: "[name]_[version]_[arch][ext]"
          args: ${{ matrix.tauri-args }}

  publish-beta-updater-manifest:
    name: Publish beta updater manifest
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !inputs.draft && (inputs.prerelease || contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-')) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download beta updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf ./tmp-beta-manifest
          mkdir -p ./tmp-beta-manifest
          gh release download "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --pattern latest.json \
            --dir ./tmp-beta-manifest
          test -f ./tmp-beta-manifest/latest.json

      - name: Publish manifest to beta branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin beta || true
          if git show-ref --verify --quiet refs/remotes/origin/beta; then
            git switch --force-create beta origin/beta
          else
            git checkout --orphan beta
            git rm -rf . || true
          fi
          cp ./tmp-beta-manifest/latest.json ./latest.json
          git add latest.json
          git diff --cached --quiet && echo "No beta manifest changes" && exit 0
          git commit -m "chore: publish beta updater manifest for $RELEASE_TAG"
          git push origin beta

  update-homebrew:
    name: Update Homebrew Cask
    runs-on: macos-latest
    needs: release
    if: ${{ !inputs.draft && !inputs.prerelease && !contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-') }}
    steps:
      - name: Validate Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::Missing HOMEBREW_TAP_TOKEN. Add a fine-grained personal access token with Contents: Read and write access to poneding/homebrew-flashot."
            exit 1
          fi

      - name: Wait for release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          AARCH64_ASSET="Flashot_${VERSION}_aarch64.dmg"
          X64_ASSET="Flashot_${VERSION}_x64.dmg"

          {
            echo "VERSION=$VERSION"
            echo "AARCH64_ASSET=$AARCH64_ASSET"
            echo "X64_ASSET=$X64_ASSET"
          } >> "$GITHUB_ENV"

          for i in $(seq 1 30); do
            ASSETS=$(gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" --json assets -q '.assets[].name')
            if echo "$ASSETS" | grep -Fxq "$AARCH64_ASSET" && echo "$ASSETS" | grep -Fxq "$X64_ASSET"; then
              echo "Both macOS DMGs found"
              exit 0
            fi
            echo "Waiting for $AARCH64_ASSET and $X64_ASSET... (attempt $i/30)"
            sleep 30
          done
          echo "::error::Timed out waiting for $AARCH64_ASSET and $X64_ASSET"
          exit 1

      - name: Download DMGs and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf ./tmp
          mkdir -p ./tmp

          gh release download "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --pattern "$AARCH64_ASSET" \
            --pattern "$X64_ASSET" \
            --dir ./tmp

          AARCH64_DMG="./tmp/$AARCH64_ASSET"
          X64_DMG="./tmp/$X64_ASSET"

          test -f "$AARCH64_DMG"
          test -f "$X64_DMG"

          AARCH64_SHA=$(shasum -a 256 "$AARCH64_DMG" | awk '{print $1}')
          X64_SHA=$(shasum -a 256 "$X64_DMG" | awk '{print $1}')

          echo "AARCH64_SHA=$AARCH64_SHA" >> "$GITHUB_ENV"
          echo "X64_SHA=$X64_SHA" >> "$GITHUB_ENV"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: poneding/homebrew-flashot
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          ref: master
          path: tap

      - name: Update cask file
        run: |
          CASK_FILE="tap/Casks/flashot.rb"

          export CASK_FILE VERSION AARCH64_SHA X64_SHA
          ruby <<'RUBY'
          cask_file = ENV.fetch("CASK_FILE")
          version = ENV.fetch("VERSION")
          aarch64_sha = ENV.fetch("AARCH64_SHA")
          x64_sha = ENV.fetch("X64_SHA")

          content = File.read(cask_file)
          unless content.sub!(/^  version ".*"$/, %(  version "#{version}"))
            abort "version line not found in #{cask_file}"
          end
          unless content.sub!(
            /^  sha256 arm:\s+".*",\n\s+intel:\s+".*"$/,
            %(  sha256 arm:   "#{aarch64_sha}",\n         intel: "#{x64_sha}"),
          )
            abort "sha256 block not found in #{cask_file}"
          end
          File.write(cask_file, content)
          RUBY

          echo "Updated cask to version $VERSION"
          cat "$CASK_FILE"

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/flashot.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update flashot to $VERSION"
          git push
